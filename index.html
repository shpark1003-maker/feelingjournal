<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 감성일기 - 당신의 하루를 기록하세요</title>
    <meta name="description" content="AI가 분석하는 감성 일기 서비스입니다. 당신의 하루를 기록하고 위로와 조언을 받아보세요.">
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1 id="main-title">오늘 하루 어땠어요?</h1>
            <p class="subtitle">당신의 소중한 감정을 기록으로 남겨보세요.</p>
        </header>

        <main>
            <section class="input-section">
                <textarea id="diary-input" placeholder="여기에 일기를 작성해 주세요..." aria-label="일기 입력창"></textarea>
                
                <div class="button-group">
                    <button id="voice-btn" class="btn secondary">
                        <span class="icon">🎙️</span> 음성으로 입력하기
                    </button>
                    <button id="analyze-btn" class="btn primary">
                        분석요청하기
                    </button>
                </div>
            </section>

            <section class="result-section">
                <h2 id="result-title">AI 답변</h2>
                <div id="ai-response-box" class="response-box">
                    <p id="response-text">여기에 AI의 답변이 표시됩니다</p>
                </div>
            </section>
        </main>

        <footer>
            <p>&copy; 2026 AI 감성일기. All rights reserved.</p>
        </footer>
    </div>
    <script src="app.js?v=2.0.0"></script>
</body>
</html>
